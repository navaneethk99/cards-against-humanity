name: Build and Release Binaries

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install ".[packaging]"

      - name: Build (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          bash ./scripts/build.sh

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\build.ps1

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: tar -czf clicards-macos.tar.gz -C dist clicards clicards-server

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf clicards-linux.tar.gz -C dist clicards clicards-server

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\\clicards.exe, dist\\clicards-server.exe -DestinationPath clicards-windows.zip

      - name: Publish Release Assets (macOS)
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: clicards-macos.tar.gz

      - name: Publish Release Assets (Linux)
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          files: clicards-linux.tar.gz

      - name: Publish Release Assets (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: clicards-windows.zip
